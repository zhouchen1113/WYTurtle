name: Windows Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布标签，例如 v1.0.0；留空则使用 manual-运行编号"
        required: false
        type: string
      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  MYSQL_VERSION: 5.7.44
  VCPKG_COMMIT: 443dda0f876acb0baf87a907e6d64e25a1184c16
  CMAKE_VERSION: 3.29.8

jobs:
  build:
    name: Build and publish Windows x64
    runs-on: windows-2022
    env:
      VCPKG_ROOT: .vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake
        shell: pwsh
        run: |
          $cmakeArchive = Join-Path $env:RUNNER_TEMP "cmake-$env:CMAKE_VERSION-windows-x86_64.zip"
          $cmakeRoot = Join-Path $env:RUNNER_TEMP "cmake"
          $cmakeUrl = "https://github.com/Kitware/CMake/releases/download/v$env:CMAKE_VERSION/cmake-$env:CMAKE_VERSION-windows-x86_64.zip"

          Invoke-WebRequest -Uri $cmakeUrl -OutFile $cmakeArchive
          if (Test-Path -LiteralPath $cmakeRoot) {
              Remove-Item -LiteralPath $cmakeRoot -Recurse -Force
          }
          Expand-Archive -LiteralPath $cmakeArchive -DestinationPath $cmakeRoot -Force

          $cmakeBin = Join-Path $cmakeRoot "cmake-$env:CMAKE_VERSION-windows-x86_64\bin"
          $cmakeExe = Join-Path $cmakeBin "cmake.exe"
          if (-not (Test-Path -LiteralPath $cmakeExe)) {
              throw "Cannot find downloaded cmake.exe at $cmakeExe"
          }

          "CMAKE_EXE=$cmakeExe" >> $env:GITHUB_ENV
          "$cmakeBin" >> $env:GITHUB_PATH
          & $cmakeExe --version

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Verify MSVC
        shell: pwsh
        run: |
          cl

      - name: Resolve Visual Studio
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswhere)) {
              throw "vswhere.exe was not found at $vswhere"
          }

          $vsPath = & $vswhere `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if ([string]::IsNullOrWhiteSpace($vsPath)) {
              & $vswhere -all -products * -format json
              throw "Cannot find a Visual Studio installation with VC.Tools.x86.x64"
          }

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path -LiteralPath $vcvars)) {
              throw "Cannot find vcvars64.bat under $vsPath"
          }

          "VS_INSTALL_DIR=$vsPath" >> $env:GITHUB_ENV
          Write-Host "Using Visual Studio: $vsPath"

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $releaseTag = "${{ inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
              if ("${{ github.ref_type }}" -eq "tag") {
                  $releaseTag = "${{ github.ref_name }}"
              } else {
                  $releaseTag = "manual-${{ github.run_number }}"
              }
          }

          $prerelease = "${{ inputs.prerelease }}"
          if ([string]::IsNullOrWhiteSpace($prerelease)) {
              $prerelease = "false"
          }

          $archiveName = "WYTurtle-$releaseTag-win64-Release"
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "archive_name=$archiveName" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
          key: wyturtle-vcpkg-windows-x64-ace-openssl-${{ env.VCPKG_COMMIT }}-${{ hashFiles('.github/workflows/windows-release.yml', 'vcpkg.json') }}
          restore-keys: |
            wyturtle-vcpkg-windows-x64-ace-openssl-

      - name: Ensure vcpkg
        shell: pwsh
        run: |
          if (-not [System.IO.Path]::IsPathRooted($env:VCPKG_ROOT)) {
              $env:VCPKG_ROOT = Join-Path $env:GITHUB_WORKSPACE $env:VCPKG_ROOT
              "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
          }

          $vcpkgExe = Join-Path $env:VCPKG_ROOT "vcpkg.exe"
          $vcpkgRootMarker = Join-Path $env:VCPKG_ROOT ".vcpkg-root"
          if ((Test-Path -LiteralPath $vcpkgExe) -and -not (Test-Path -LiteralPath $vcpkgRootMarker)) {
              Remove-Item -LiteralPath $env:VCPKG_ROOT -Recurse -Force
          }

          $vcpkgGitDir = Join-Path $env:VCPKG_ROOT ".git"
          if ((Test-Path -LiteralPath $env:VCPKG_ROOT) -and -not (Test-Path -LiteralPath $vcpkgGitDir)) {
              Remove-Item -LiteralPath $env:VCPKG_ROOT -Recurse -Force
          }

          if (-not (Test-Path -LiteralPath $vcpkgGitDir)) {
              git clone --depth 1 https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          }

          git -C "$env:VCPKG_ROOT" fetch --depth 1 origin "$env:VCPKG_COMMIT"
          git -C "$env:VCPKG_ROOT" checkout --force "$env:VCPKG_COMMIT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
          & $vcpkgExe version

      - name: Install ACE and OpenSSL
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            --triplet x64-windows `
            --x-manifest-root="$env:GITHUB_WORKSPACE" `
            --x-install-root="$env:VCPKG_ROOT\installed" `
            --clean-after-build

      - name: Prepare Windows dependencies
        shell: pwsh
        run: |
          .\.github\scripts\prepare-windows-deps.ps1 `
            -SourceDir "$env:GITHUB_WORKSPACE" `
            -VcpkgRoot "$env:VCPKG_ROOT" `
            -MySqlVersion "$env:MYSQL_VERSION"

      - name: Configure CMake
        shell: pwsh
        run: |
          $buildDir = Join-Path $env:GITHUB_WORKSPACE "build"
          $installDir = Join-Path $env:GITHUB_WORKSPACE "install"
          $aceRoot = Join-Path $env:VCPKG_ROOT "installed\x64-windows"

          if (Test-Path -LiteralPath $buildDir) {
              Remove-Item -LiteralPath $buildDir -Recurse -Force
          }

          Remove-Item Env:CC -ErrorAction SilentlyContinue
          Remove-Item Env:CXX -ErrorAction SilentlyContinue
          & "$env:CMAKE_EXE" --version

          & "$env:CMAKE_EXE" -S "$env:GITHUB_WORKSPACE" `
                -B "$buildDir" `
                -G "Visual Studio 17 2022" `
                -A x64 `
                -T v143,host=x64 `
                -DCMAKE_GENERATOR_INSTANCE="$env:VS_INSTALL_DIR" `
                -DPREFIX="$installDir" `
                -DACE_ROOT="$aceRoot" `
                -DUSE_LUA=ON `
                -DUSE_SCRIPTS=ON `
                -DUSE_DISCORD_BOT=OFF

      - name: Build and install
        shell: pwsh
        run: |
          $buildDir = Join-Path $env:GITHUB_WORKSPACE "build"
          & "$env:CMAKE_EXE" --build "$buildDir" --config "$env:BUILD_TYPE" --target INSTALL -- /m

      - name: Verify installed files
        shell: pwsh
        run: |
          $installDir = Join-Path $env:GITHUB_WORKSPACE "install"
          $required = @(
              "realmd.exe",
              "mangosd.exe",
              "lua52_compiler.exe",
              "realmd.conf.dist",
              "mangosd.conf.dist",
              "libmySQL.dll"
          )

          foreach ($file in $required) {
              $path = Join-Path $installDir $file
              if (-not (Test-Path -LiteralPath $path)) {
                  throw "Missing installed file: $path"
              }
          }

          $requiredDllPatterns = @(
              "ACE*.dll",
              "libssl*.dll",
              "libcrypto*.dll"
          )

          foreach ($pattern in $requiredDllPatterns) {
              $match = Get-ChildItem -LiteralPath $installDir -File -Filter $pattern | Select-Object -First 1
              if (-not $match) {
                  throw "Missing runtime DLL matching pattern: $pattern"
              }
          }

          Get-ChildItem -LiteralPath $installDir -File | Sort-Object Name | Select-Object Name, Length

      - name: Package release
        id: package
        shell: pwsh
        run: |
          $installDir = Join-Path $env:GITHUB_WORKSPACE "install"
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $commit = git -C "$env:GITHUB_WORKSPACE" rev-parse HEAD
          Set-Content -LiteralPath (Join-Path $installDir "BUILD_COMMIT.txt") -Value $commit -Encoding ASCII

          $archivePath = Join-Path $artifactDir "${{ steps.meta.outputs.archive_name }}.zip"
          if (Test-Path -LiteralPath $archivePath) {
              Remove-Item -LiteralPath $archivePath -Force
          }
          Compress-Archive -Path (Join-Path $installDir "*") -DestinationPath $archivePath -Force
          "archive_path=$archivePath" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: WYTurtle ${{ steps.meta.outputs.release_tag }}
          files: ${{ steps.package.outputs.archive_path }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
